<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมการเรียนรู้: การหาค่าเฉลี่ย</title>
    <style>
        /* ==========================================
           1. CSS Variables & Reset
           ========================================== */
        :root {
            --color-bg: #FFFBF5;        /* ครีมอ่อน */
            --color-primary: #FFB6C1;   /* ชมพูพาสเทล */
            --color-secondary: #A8E6CF; /* มิ้นต์พาสเทล */
            --color-accent: #FFD3B6;    /* ส้ม/พีชพาสเทล */
            --color-text: #5D4037;      /* น้ำตาลเข้ม */
            --color-white: #FFFFFF;
            --color-correct: #A8E6CF;
            --color-wrong: #FFAAA5;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            --border-radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', 'Prompt', sans-serif;
            color: var(--color-text);
        }

        body {
            background-color: #f4f4f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 10px;
        }

        /* ==========================================
           2. Main Container
           ========================================== */
        #game-container {
            width: 100%;
            max-width: 640px;
            background-color: var(--color-bg);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }

        /* ==========================================
           3. Top Bar (Audio & Hints)
           ========================================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            z-index: 20;
        }

        .icon-btn {
            background: var(--color-white);
            border: 2px solid var(--color-accent);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            transition: transform 0.2s, background 0.2s;
            box-shadow: var(--shadow);
        }

        .icon-btn:hover {
            transform: scale(1.1);
            background: var(--color-accent);
        }

        .hint-btn {
            background: var(--color-secondary);
            border-color: var(--color-secondary);
            border-radius: 20px;
            width: auto;
            padding: 0 15px;
            font-weight: bold;
            font-size: 16px;
            display: none; /* ซ่อนไว้ก่อน จะแสดงในด่าน 3 */
        }

        /* ==========================================
           4. Sticky Question Box (Stage 2)
           ========================================== */
        #sticky-box {
            position: sticky;
            top: 0;
            background-color: var(--color-white);
            padding: 15px 20px;
            border-bottom: 3px dashed var(--color-primary);
            display: none;
            align-items: center;
            gap: 10px;
            z-index: 10;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }

        .sticky-text {
            font-weight: bold;
            font-size: 16px;
            line-height: 1.4;
        }

        /* ==========================================
           5. Stages (Views)
           ========================================== */
        .stage {
            padding: 30px 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
            flex-grow: 1;
            animation: fadeIn 0.5s ease-out;
        }

        .stage.active {
            display: flex;
        }

        .title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            line-height: 1.5;
        }

        .subtitle {
            font-size: 16px;
            margin-bottom: 25px;
            color: #795548;
        }

        /* ==========================================
           6. Data Display (Stage 1)
           ========================================== */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 30px;
            width: 100%;
        }

        .data-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: var(--color-white);
            padding: 10px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            animation: floatItem 3s ease-in-out infinite;
        }

        .data-item:nth-child(even) {
            animation-delay: 1.5s;
        }

        .data-value {
            font-size: 18px;
            font-weight: bold;
            margin-top: 5px;
            color: var(--color-text);
        }

        /* ==========================================
           7. Buttons
           ========================================== */
        .btn-primary {
            background-color: var(--color-primary);
            color: var(--color-text);
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 4px 0 #E5A3AD, var(--shadow);
            transition: all 0.1s ease;
            margin-top: 20px;
        }

        .btn-primary:active {
            transform: translateY(4px);
            box-shadow: 0 0 0 #E5A3AD;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
            margin-top: 20px;
        }

        .option-btn {
            background-color: var(--color-white);
            border: 2px solid var(--color-accent);
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .option-btn:hover {
            background-color: var(--color-accent);
            transform: scale(1.02);
        }

        /* ==========================================
           8. Feedback & Hint Modals
           ========================================== */
        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(3px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
            text-align: center;
            animation: fadeIn 0.3s ease-out;
        }

        .feedback-box {
            background: var(--color-white);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
            border: 4px solid var(--color-wrong);
        }

        .feedback-box.correct {
            border-color: var(--color-correct);
        }

        .feedback-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .feedback-text {
            font-size: 18px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .hint-box {
            background: var(--color-white);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 90%;
            width: 400px;
            border: 4px solid var(--color-secondary);
            text-align: left;
        }

        .hint-list {
            margin-top: 15px;
            list-style: none;
        }

        .hint-list li {
            background: var(--color-bg);
            padding: 10px 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fadeIn 0.3s ease-out;
        }

        /* ==========================================
           9. Animations & Utilities
           ========================================== */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes floatItem {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        @keyframes glow {
            0%, 100% { filter: drop-shadow(0 0 10px var(--color-primary)); }
            50% { filter: drop-shadow(0 0 25px var(--color-primary)); }
        }

        .glow-effect {
            animation: glow 2s infinite;
        }

        .svg-icon {
            width: 40px;
            height: 40px;
        }

        .svg-icon-small {
            width: 25px;
            height: 25px;
        }

        .svg-icon-large {
            width: 120px;
            height: 120px;
            margin-bottom: 20px;
        }

        /* Responsive adjustments */
        @media (max-width: 480px) {
            .data-grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
            .data-item { padding: 5px; }
            .data-value { font-size: 14px; }
            .svg-icon { width: 30px; height: 30px; }
            .options-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="top-bar">
        <button class="icon-btn" id="btn-audio" onclick="toggleAudio()" aria-label="เปิด/ปิดเสียง">🔊</button>
        <button class="icon-btn hint-btn" id="btn-hint" onclick="showHint()">💡 ขอคำใบ้</button>
    </div>

    <div id="sticky-box">
        <div id="sticky-icon-container"></div>
        <div class="sticky-text">ข้อมูลยอดขาย 10 วัน: 35, 37, 38, 40, 41, 36, 39, 40, 42, 32</div>
    </div>

    <div id="stage-intro" class="stage active">
        <div class="title">คราวนี้ลองดูตัวอย่างนี้นะ</div>
        <div class="subtitle">ร้านกาแฟแห่งหนึ่งบันทึกจำนวนแก้วที่ขายได้ในสิบวันเป็น<br>35, 37, 38, 40, 41, 36, 39, 40, 42 และ 32 แก้ว</div>
        
        <div class="data-grid" id="intro-data">
            </div>

        <button class="btn-primary" onclick="startGame()">☕ เริ่มภารกิจ</button>
    </div>

    <div id="stage-question" class="stage">
        <div id="question-icon-container" style="margin-bottom: 10px;"></div>
        <div class="title" id="question-text">คำถาม</div>
        <div class="options-grid" id="options-container">
            </div>
    </div>

    <div id="stage-win" class="stage">
        <div class="title">ถูกต้อง 🎉</div>
        <div class="subtitle" style="font-size: 20px; font-weight: bold; color: var(--color-primary);">ค่าเฉลี่ยคือ 38 แก้วต่อวัน</div>
        <div id="win-icon-container" class="glow-effect"></div>
    </div>

    <div id="feedback-overlay" class="overlay">
        <div class="feedback-box" id="feedback-box">
            <div class="feedback-icon" id="feedback-icon">❌</div>
            <div class="feedback-text" id="feedback-text">ข้อความอธิบาย</div>
            <button class="btn-primary" id="feedback-btn" onclick="closeFeedback()">ลองใหม่</button>
        </div>
    </div>

    <div id="hint-overlay" class="overlay" style="align-items: flex-start; padding-top: 60px;">
        <div class="hint-box">
            <div class="title" style="margin-bottom: 5px;">💡 คำใบ้</div>
            <ul class="hint-list" id="hint-list">
                </ul>
            <div style="text-align: center; margin-top: 20px;">
                <button class="btn-primary" onclick="closeHint()">เข้าใจแล้ว</button>
            </div>
        </div>
    </div>
</div>

<script>
    /* ==========================================
       1. SVG Coffee Cup Template (Inline)
       ========================================== */
    const getCoffeeIcon = (className = 'svg-icon') => `
        <svg class="${className}" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
            <path d="M 65 45 C 85 45 85 75 65 75" fill="none" stroke="#D7CCC8" stroke-width="8" stroke-linecap="round"/>
            <path d="M 25 35 C 25 35 30 85 30 85 C 30 95 70 95 70 85 C 70 85 75 35 75 35 Z" fill="#EFEBE9"/>
            <path d="M 27 50 L 73 50 L 71 70 L 29 70 Z" fill="#A8E6CF"/>
            <path d="M 20 35 C 20 20 80 20 80 35 C 80 45 20 45 20 35 Z" fill="#FFB6C1"/>
            <circle cx="42" cy="60" r="2.5" fill="#5D4037"/>
            <circle cx="58" cy="60" r="2.5" fill="#5D4037"/>
            <path d="M 47 63 Q 50 67 53 63" fill="none" stroke="#5D4037" stroke-width="2" stroke-linecap="round"/>
        </svg>
    `;

    /* ==========================================
       2. Game Data
       ========================================== */
    const rawData = [35, 37, 38, 40, 41, 36, 39, 40, 42, 32];
    
    const questions = [
        {
            step: 1,
            text: "ขั้นที่ 1: เมื่อนำข้อมูลทั้งหมดมารวมกัน จะได้เท่าไร",
            options: [
                { label: 'A', value: '360', isCorrect: false, feedback: "ยังไม่ถูก ผลรวมนี้ยังน้อยเกินไป ลองบวกข้อมูลทั้ง 10 วันให้ครบอีกครั้ง" },
                { label: 'B', value: '370', isCorrect: false, feedback: "ผลรวมนี้ยังไม่ครบ เพราะข้อมูลบางวันยังไม่ได้รวมอย่างถูกต้อง" },
                { label: 'C', value: '380', isCorrect: true, feedback: "ถูกต้อง ผลรวมทั้งหมดคือ 380" },
                { label: 'D', value: '390', isCorrect: false, feedback: "ผลรวมนี้มากเกินไป ลองบวกทีละจำนวนอย่างระมัดระวังอีกครั้ง" }
            ]
        },
        {
            step: 2,
            text: "ขั้นที่ 2: ข้อมูลชุดนี้มีทั้งหมดกี่วัน",
            options: [
                { label: 'A', value: '8', isCorrect: false, feedback: "ข้อมูลมีมากกว่า 8 วัน ลองนับจำนวนข้อมูลใหม่ให้ครบ" },
                { label: 'B', value: '9', isCorrect: false, feedback: "ข้อมูลมี 10 ค่า ไม่ใช่ 9 ค่า" },
                { label: 'C', value: '10', isCorrect: true, feedback: "ถูกต้อง มีข้อมูลทั้งหมด 10 วัน" },
                { label: 'D', value: '380', isCorrect: false, feedback: "380 คือผลรวมของข้อมูลทั้งหมด ไม่ใช่จำนวนวัน" }
            ]
        },
        {
            step: 3,
            text: "ขั้นที่ 3: เมื่อนำผลรวม 380 หารด้วย 10 วัน จะได้ค่าเฉลี่ยเท่าไร",
            options: [
                { label: 'A', value: '28', isCorrect: false, feedback: "28 น้อยเกินไป เพราะข้อมูลส่วนใหญ่มีค่าอยู่ช่วงประมาณ 35 ถึง 42" },
                { label: 'B', value: '38', isCorrect: true, feedback: "ถูกต้อง" }, // ไปหน้าจอ Win
                { label: 'C', value: '48', isCorrect: false, feedback: "48 มากเกินไป เพราะข้อมูลทั้งหมดไม่ได้มีค่าสูงขนาดนั้น" },
                { label: 'D', value: '380', isCorrect: false, feedback: "380 เป็นผลรวมของข้อมูลทั้งหมด ยังไม่ได้หารด้วยจำนวนวัน" }
            ]
        }
    ];

    const allHints = [
        "ลองนำข้อมูลทั้งหมดมารวมกันก่อน",
        "เมื่อรวมกันแล้วจะได้ทั้งหมด 380",
        "จากนั้นนำไปหารด้วยจำนวนข้อมูล 10 วัน"
    ];

    /* ==========================================
       3. State Variables
       ========================================== */
    let currentStepIndex = 0;
    let revealedHintsCount = 0;
    
    /* ==========================================
       4. Audio System (Web Audio API)
       ========================================== */
    let audioCtx = null;
    let isMuted = false;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }

    function toggleAudio() {
        isMuted = !isMuted;
        document.getElementById('btn-audio').innerText = isMuted ? '🔇' : '🔊';
        playSound('click');
    }

    function playSound(type) {
        if (isMuted || !audioCtx) return;
        
        const osc = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        osc.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        const now = audioCtx.currentTime;

        if (type === 'click') {
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, now);
            osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.start(now);
            osc.stop(now + 0.1);
        } else if (type === 'correct') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(400, now);
            osc.frequency.setValueAtTime(600, now + 0.1);
            osc.frequency.setValueAtTime(800, now + 0.2);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.5);
            osc.start(now);
            osc.stop(now + 0.5);
        } else if (type === 'wrong') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(300, now);
            osc.frequency.exponentialRampToValueAtTime(150, now + 0.3);
            gainNode.gain.setValueAtTime(0.3, now);
            gainNode.gain.linearRampToValueAtTime(0, now + 0.3);
            osc.start(now);
            osc.stop(now + 0.3);
        }
    }

    /* ==========================================
       5. Game Logic & UI Render
       ========================================== */
    
    // ตั้งค่าเริ่มต้นของหน้าจอ Intro
    function setupIntro() {
        const grid = document.getElementById('intro-data');
        rawData.forEach(num => {
            const item = document.createElement('div');
            item.className = 'data-item';
            item.innerHTML = getCoffeeIcon('svg-icon') + `<div class="data-value">${num}</div>`;
            grid.appendChild(item);
        });

        // แทรกไอคอนในจุดต่างๆ
        document.getElementById('sticky-icon-container').innerHTML = getCoffeeIcon('svg-icon-small');
        document.getElementById('question-icon-container').innerHTML = getCoffeeIcon('svg-icon');
        document.getElementById('win-icon-container').innerHTML = getCoffeeIcon('svg-icon-large');
    }

    function startGame() {
        initAudio();
        playSound('click');
        
        // ซ่อน Intro แสดง Question และ Sticky Box
        document.getElementById('stage-intro').classList.remove('active');
        document.getElementById('stage-question').classList.add('active');
        document.getElementById('sticky-box').style.display = 'flex';
        document.getElementById('btn-hint').style.display = 'inline-block';

        renderQuestion();
    }

    function renderQuestion() {
        const qData = questions[currentStepIndex];
        document.getElementById('question-text').innerText = qData.text;
        
        const optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        qData.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerHTML = `<span>${opt.label}.</span> <span>${opt.value}</span>`;
            btn.onclick = () => handleAnswer(opt);
            optionsContainer.appendChild(btn);
        });
    }

    function handleAnswer(selectedOption) {
        playSound('click');
        const box = document.getElementById('feedback-box');
        const icon = document.getElementById('feedback-icon');
        const text = document.getElementById('feedback-text');
        const btn = document.getElementById('feedback-btn');

        if (selectedOption.isCorrect) {
            playSound('correct');
            // หากเป็นข้อสุดท้าย (หาค่าเฉลี่ย)
            if (currentStepIndex === 2) {
                showWinScreen();
                return;
            }

            // หากเป็นข้ออื่นที่ตอบถูก
            box.className = 'feedback-box correct';
            icon.innerText = '✅';
            text.innerText = selectedOption.feedback;
            btn.innerText = 'ไปขั้นถัดไป';
            btn.onclick = () => {
                playSound('click');
                closeFeedback();
                currentStepIndex++;
                renderQuestion();
            };
        } else {
            playSound('wrong');
            // หากตอบผิด
            box.className = 'feedback-box';
            icon.innerText = '❌';
            text.innerText = selectedOption.feedback;
            btn.innerText = 'ลองใหม่';
            btn.onclick = () => {
                playSound('click');
                closeFeedback();
            };
        }

        document.getElementById('feedback-overlay').style.display = 'flex';
    }

    function closeFeedback() {
        document.getElementById('feedback-overlay').style.display = 'none';
    }

    function showWinScreen() {
        document.getElementById('stage-question').classList.remove('active');
        document.getElementById('sticky-box').style.display = 'none';
        document.getElementById('btn-hint').style.display = 'none';
        document.getElementById('stage-win').classList.add('active');
        document.getElementById('feedback-overlay').style.display = 'none';
    }

    /* ==========================================
       6. Scaffolding (Hint System)
       ========================================== */
    function showHint() {
        playSound('click');
        const overlay = document.getElementById('hint-overlay');
        const list = document.getElementById('hint-list');
        
        // เพิ่มคำใบ้ใหม่ถ้ายังไม่ครบ
        if (revealedHintsCount < allHints.length) {
            revealedHintsCount++;
            list.innerHTML = ''; // เคลียร์แล้ววาดใหม่เพื่ออนิเมชั่น
            
            for (let i = 0; i < revealedHintsCount; i++) {
                const li = document.createElement('li');
                li.innerHTML = getCoffeeIcon('svg-icon-small') + `<span>${allHints[i]}</span>`;
                list.appendChild(li);
            }
        }
        
        overlay.style.display = 'flex';
    }

    function closeHint() {
        playSound('click');
        document.getElementById('hint-overlay').style.display = 'none';
    }

    // Initialize game
    window.onload = setupIntro;

</script>
</body>
</html>
